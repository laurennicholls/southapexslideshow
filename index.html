<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rock Solid Warrior South Apex Slideshow</title>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}
</style>

<script>
// Reload the slideshow every 5 minutes
setInterval(() => {
  const frame = document.getElementById('slides');
  frame.src = frame.src;
}, 86400000);
</script>

</head>
<body>

<iframe
  id="slides"
  src="https://docs.google.com/presentation/d/e/2PACX-1vQLhR4t876Zi_sXGzgerLsgBWsLTI7z2KxcxlRY6dHac6q0SqUa4icbqnLc3dTDnuL8yPmLOCBE6SoC/pubembed?start=true&loop=true&delayms=10000"
  allowfullscreen>
</iframe>

</body>
</html>
